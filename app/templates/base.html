<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or "NotebookLM API" }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_15%_20%,rgba(14,165,233,0.2),transparent_35%),radial-gradient(circle_at_85%_15%,rgba(34,197,94,0.18),transparent_35%),radial-gradient(circle_at_80%_80%,rgba(251,191,36,0.12),transparent_40%)]"></div>
  <main class="relative mx-auto max-w-7xl px-4 py-8 md:px-8 md:py-12">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
