<div class="rounded-2xl border p-4 {% if variant == 'success' %}border-emerald-500/40 bg-emerald-500/10{% else %}border-rose-500/40 bg-rose-500/10{% endif %}">
  <h3 class="text-sm font-semibold {% if variant == 'success' %}text-emerald-300{% else %}text-rose-300{% endif %}">{{ title }}</h3>
  <p class="mt-1 text-sm text-slate-200">{{ message }}</p>

  {% if elapsed_ms is not none %}
  <p class="mt-2 text-xs text-slate-300">Tempo de execucao: {{ elapsed_ms }} ms</p>
  {% endif %}

  {% if details %}
  <pre class="mt-3 overflow-auto rounded-xl border border-slate-700/70 bg-slate-950/80 p-3 text-xs text-slate-200">{{ details | tojson(indent=2) }}</pre>
  {% endif %}
</div>
